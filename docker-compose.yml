services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/bulatruslanovich/crmwebapi:latest  
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=crm_db;Username=crm_user;Password=${DB_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: PharmaCrmApi
      Jwt__Audience: PharmaCrmClient
      Cors__AllowedOrigins: ${CORS_ORIGINS}
      Email__Host: smtp.gmail.com
      Email__Port: "465"
      Email__Username: gikirilcva@gmail.com
      Email__Password: ${EMAIL_PASSWORD}
      Email__FromAddress: gikirilcva@gmail.com
      Email__FromName: CRM System


  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
